name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - run: sudo xcode-select -s /Applications/Xcode_26.0.app
      - uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
      - run: swift build --configuration release
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:swift
