name: FileSystem

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_EXPERIMENTAL: "1"

concurrency:
  group: file-system-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Release build on macOS"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - run: sudo xcode-select -s /Applications/Xcode_16.3.app
      - uses: jdx/mise-action@v4
      - name: Run
        run: mise run build-spm

  build-linux:
    name: "Release build on Linux"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Run
        run: mise run build-linux

  build-musl:
    name: "Release build on Static Linux SDK (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    container:
      image: swift:6.2
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            sdk-target: x86_64-swift-linux-musl
          - arch: aarch64
            runner: ubuntu-24.04-arm
            sdk-target: aarch64-swift-linux-musl
    steps:
      - uses: actions/checkout@v6
      - name: Cache Static Linux SDK
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm/swift-sdks
          key: static-linux-sdk-swift-6.2.3-${{ matrix.arch }}
      - name: Install Swift Static Linux SDK
        run: |
          if ! swift sdk list | grep -q "swift-6.2.3-RELEASE_static-linux"; then
            swift sdk install \
              https://download.swift.org/swift-6.2.3-release/static-sdk/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz \
              --checksum f30ec724d824ef43b5546e02ca06a8682dafab4b26a99fbb0e858c347e507a2c
          fi
      - name: Build
        run: swift build --configuration release --build-path ./.build/musl --swift-sdk ${{ matrix.sdk-target }}

  test:
    name: "Test on macOS"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - run: sudo xcode-select -s /Applications/Xcode_16.3.app
      - uses: jdx/mise-action@v4
      - name: Run
        run: mise run test-spm

  test_linux:
    name: "Test on Linux"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Run
        run: mise run test-linux

  build-windows:
    name: "Release build on Windows"
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: compnerd/gha-setup-vsdevenv@main
      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.0.3-release
          swift-build: 6.0.3-RELEASE
          update-sdk-modules: true
      - name: Build
        run: swift build --configuration release

  test-windows:
    name: "Test on Windows"
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: compnerd/gha-setup-vsdevenv@main
      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.0.3-release
          swift-build: 6.0.3-RELEASE
          update-sdk-modules: true
      - name: Test
        run: swift test

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - run: sudo xcode-select -s /Applications/Xcode_16.3.app
      - uses: jdx/mise-action@v4
      - name: Run
        run: mise run lint
